{% extends "admin/base_site.html" %}

{% block content %}
  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    <fieldset class="module aligned">
      {{ form.as_p }}
    </fieldset>
    <div class="submit-row">
      <input type="submit" value="Upload and import" class="default">
      <a href="../">Cancel</a>
    </div>
  </form>
{% endblock %}
